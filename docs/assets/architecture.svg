<svg viewBox="0 0 1120 480" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="arcTitle arcDesc" font-family="'Segoe UI',system-ui,-apple-system,sans-serif">
  <title id="arcTitle">How iM.Master drives the robot</title>
  <desc id="arcDesc">The core SDK moves the robot body from Python; the optional AI addon (camera, detector, local LLM) is a layer on top that calls the same core.</desc>
  <defs>
    <marker id="aRed" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#d23a16"/></marker>
    <marker id="aOr" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#f7801e"/></marker>
  </defs>

  <rect x="0" y="0" width="1120" height="480" rx="16" fill="#1b1b1b"/>

  <text x="44" y="46" fill="#f2ede7" font-size="23" font-weight="600">How iM.Master drives the robot</text>
  <text x="44" y="70" fill="#a89f96" font-size="13.5">The core SDK moves the body. The AI addon is an optional layer that calls the same <tspan fill="#f7801e" font-family="monospace">Robot</tspan> API.</text>

  <!-- ===== AI ADDON container ===== -->
  <rect x="40" y="90" width="1040" height="132" rx="12" fill="#241a16" stroke="#d23a16" stroke-width="1.5" stroke-dasharray="7 5"/>
  <text x="62" y="115" fill="#ef6a3c" font-size="12" font-weight="700" letter-spacing="2">OPTIONAL  AI  ADDON</text>

  <!-- camera -->
  <rect x="64" y="126" width="296" height="78" rx="9" fill="#2a2725" stroke="#423d39" stroke-width="1.4"/>
  <text x="212" y="162" text-anchor="middle" fill="#f2ede7" font-size="15.5" font-weight="600">📷  Camera</text>
  <text x="212" y="184" text-anchor="middle" fill="#a89f96" font-size="12.5">grab a frame</text>
  <!-- detector -->
  <rect x="412" y="126" width="296" height="78" rx="9" fill="#2a2725" stroke="#423d39" stroke-width="1.4"/>
  <text x="560" y="162" text-anchor="middle" fill="#f2ede7" font-size="15.5" font-weight="600">🔍  Object detector</text>
  <text x="560" y="184" text-anchor="middle" fill="#a89f96" font-size="12.5">“cup · right · near”</text>
  <!-- llm -->
  <rect x="760" y="126" width="296" height="78" rx="9" fill="#2a2725" stroke="#423d39" stroke-width="1.4"/>
  <text x="908" y="160" text-anchor="middle" fill="#f2ede7" font-size="15.5" font-weight="600">🧠  Local LLM</text>
  <text x="908" y="185" text-anchor="middle" fill="#fba23c" font-size="12" font-family="monospace">{"action":"veer_right"}</text>

  <line x1="362" y1="165" x2="406" y2="165" stroke="#d23a16" stroke-width="2" marker-end="url(#aRed)"/>
  <line x1="710" y1="165" x2="754" y2="165" stroke="#d23a16" stroke-width="2" marker-end="url(#aRed)"/>

  <!-- feed down into core -->
  <path d="M470 222 L470 292" fill="none" stroke="#f7801e" stroke-width="2" marker-end="url(#aOr)"/>
  <text x="482" y="262" fill="#f7801e" font-size="12.5" font-family="monospace">drive() / stop()</text>

  <!-- ===== CORE SDK container ===== -->
  <rect x="40" y="300" width="1040" height="140" rx="12" fill="#211a14" stroke="#f7801e" stroke-width="1.6"/>
  <text x="62" y="325" fill="#f7801e" font-size="12" font-weight="700" letter-spacing="2">CORE  SDK  ·  pure Python, no deps</text>

  <!-- your code -->
  <rect x="64" y="338" width="212" height="82" rx="9" fill="#2a2725" stroke="#423d39" stroke-width="1.4"/>
  <text x="170" y="373" text-anchor="middle" fill="#f2ede7" font-size="15" font-weight="600">🐍 Your Python code</text>
  <text x="170" y="395" text-anchor="middle" fill="#a89f96" font-size="12">bot.forward()</text>
  <!-- robot.py -->
  <rect x="326" y="338" width="266" height="82" rx="9" fill="#2e2113" stroke="#fba23c" stroke-width="1.6"/>
  <text x="459" y="373" text-anchor="middle" fill="#f2ede7" font-size="15" font-weight="600" font-family="monospace">immaster.robot</text>
  <text x="459" y="395" text-anchor="middle" fill="#fba23c" font-size="12">named moves + safety watchdog</text>
  <!-- BLE -->
  <rect x="642" y="338" width="230" height="82" rx="9" fill="#2a2725" stroke="#423d39" stroke-width="1.4"/>
  <text x="757" y="373" text-anchor="middle" fill="#f2ede7" font-size="15" font-weight="600">BLE advertising</text>
  <text x="757" y="395" text-anchor="middle" fill="#a89f96" font-size="12" font-family="monospace">company 0x53A6</text>
  <!-- robot -->
  <rect x="922" y="338" width="134" height="82" rx="9" fill="#2a2725" stroke="#423d39" stroke-width="1.4"/>
  <text x="989" y="374" text-anchor="middle" fill="#f2ede7" font-size="26">🤖</text>
  <text x="989" y="398" text-anchor="middle" fill="#a89f96" font-size="12">robot body</text>

  <line x1="278" y1="379" x2="320" y2="379" stroke="#f7801e" stroke-width="2" marker-end="url(#aOr)"/>
  <line x1="594" y1="379" x2="636" y2="379" stroke="#f7801e" stroke-width="2" marker-end="url(#aOr)"/>
  <line x1="874" y1="379" x2="916" y2="379" stroke="#f7801e" stroke-width="2" marker-end="url(#aOr)"/>
</svg>
